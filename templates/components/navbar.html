{% load static %}

      <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-8">
    </a>
    <div class="space-x-4">

        <span class="text-gray-700 font-medium">Fitur 1</span>
      {% else %}
        <a href="{% url 'login' %}" class="text-gray-700 hover:text-gray-900">Login</a>
        <a href="{% url 'register' %}" class="text-gray-700 hover:text-gray-900">Register</a>
      {% endif %}
    </div>
  </div>
</nav>
