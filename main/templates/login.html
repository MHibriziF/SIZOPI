{% extends 'base.html' %}
{% block meta %}
  <title>Login</title>
{% endblock meta %}

{% block content %}
  {% load static %}
  {% include 'components/navbar.html' %}

  <div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="w-full max-w-sm bg-[#F3F7EE]/90 backdrop-blur-sm rounded-2xl p-8 border border-green-200 shadow-lg">
      <h2 class="text-center text-2xl font-semibold text-[#4A5A43] mb-6">Hi, welcome!</h2>
      <form action="{% url 'main:login' %}" method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="username" class="block text-sm font-medium text-[#6F826A] mb-1">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            required
            placeholder="type here…"
            class="w-full px-4 py-2 rounded-lg border border-green-200 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-300"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-[#6F826A] mb-1">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            required
            placeholder="type here…"
            class="w-full px-4 py-2 rounded-lg border border-green-200 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-300"
          />
        </div>
        <button
          type="submit"
          class="w-full py-2 mt-1 bg-[#A7C796] text-white rounded-full font-medium hover:bg-opacity-90 transition"
        >
          LOGIN
        </button>
      </form>
      <p class="mt-6 text-center text-sm text-gray-600">
        Don’t have an account?
        <a href="{% url 'main:register' %}" class="text-[#6F826A] font-medium hover:underline">
          Register here
        </a>
      </p>
    </div>
  </div>
{% endblock content %}
