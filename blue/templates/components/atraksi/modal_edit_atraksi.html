
<!-- Modal Edit -->
<div id="modalEditAtraksi" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-lg relative max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-bold mb-6 text-center">Edit Atraksi</h2>
        <form method="POST" action="#" id="formEditAtraksi">
            {% csrf_token %}
            
            <input type="hidden" name="id_atraksi" id="edit_id_atraksi">

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nama Atraksi</label>
                <input type="text" name="nama_atraksi" id="edit_nama_atraksi" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Lokasi</label>
                <input type="text" name="lokasi" id="edit_lokasi" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Kapasitas Maksimum</label>
                <input type="number" name="kapasitas" id="edit_kapasitas" min="1" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>
            <!-- HARDCODED DATA -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Pelatih Pertunjukan</label>
                <select name="pelatih" id="edit_pelatih" multiple class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
                    {% for pelatih in data_pelatih %}
                        <option value="{{ pelatih.username }}">
                            {{ pelatih.nama_depan }}{% if pelatih.nama_tengah %} {{ pelatih.nama_tengah }}{% endif %} {{ pelatih.nama_belakang }}
                        </option>
                    {% endfor %}
                </select>
                <p class="text-sm text-gray-500 mt-1">Hold Ctrl (Cmd di Mac) untuk memilih lebih dari satu pelatih.</p>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Jadwal</label>
                <input type="time" name="jadwal" id="edit_jadwal" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Hewan yang Terlibat</label>
                <select name="hewan_terlibat" id="edit_hewan_terlibat" multiple class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300">
                {% for hewan in data_hewan %}
                    <option value="{{ hewan.id }}">
                        {{ hewan.spesies }} - {{ hewan.nama }}
                    </option>
                {% endfor %}
                </select>
                <p class="text-sm text-gray-500 mt-1">Hold Ctrl (Cmd di Mac) untuk memilih lebih dari satu hewan.</p>
            </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="tutupModalEditAtraksi()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditModal(element) {
        const nama = element.getAttribute('data-nama');
        const lokasi = element.getAttribute('data-lokasi');
        const kapasitas = element.getAttribute('data-kapasitas');
        const jadwal = element.getAttribute('data-jadwal');

        // Pelatih dan hewan dipisah koma jadi array
        const pelatihList = element.getAttribute('data-pelatih')?.split(',') || [];
        const hewanList = element.getAttribute('data-hewan')?.split(',') || [];

        // Isi input biasa
        document.getElementById('edit_nama_atraksi').value = nama;
        document.getElementById('edit_lokasi').value = lokasi;
        document.getElementById('edit_kapasitas').value = kapasitas;
        document.getElementById('edit_jadwal').value = jadwal;

        // Set selected di pelatih multiple select
        const selectPelatih = document.getElementById('edit_pelatih');
        for (let option of selectPelatih.options) {
            option.selected = pelatihList.includes(option.value);
        }

        // Set selected di hewan multiple select
        const selectHewan = document.getElementById('edit_hewan_terlibat');
        for (let option of selectHewan.options) {
            option.selected = hewanList.includes(option.value);
        }

        // Tampilkan modal edit
        const modal = document.getElementById('modalEditAtraksi');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }


    function tutupModalEditAtraksi() {
        document.getElementById('modalEditAtraksi').classList.remove('flex');
        document.getElementById('modalEditAtraksi').classList.add('hidden');
    }
</script>
