<!-- Modal -->
<div id="modalAddAtraksi" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-lg relative max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-bold mb-6 text-center">Tambah Atraksi</h2>
        <form method="POST" action="#">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nama Atraksi</label>
                <input type="text" name="nama_atraksi" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Lokasi</label>
                <input type="text" name="lokasi" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Kapasitas Maksimum</label>
                <input type="number" name="kapasitas" min="1" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Pelatih Pertunjukan</label>
                <!-- HARDCODED DATA -->

                <select name="pelatih" multiple class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
                    {% for pelatih in data_pelatih %}
                        <option value="{{ pelatih.nama_depan }}{% if pelatih.nama_tengah %} {{ pelatih.nama_tengah }}{% endif %} {{ pelatih.nama_belakang }}">
                            {{ pelatih.nama_depan }}{% if pelatih.nama_tengah %} {{ pelatih.nama_tengah }}{% endif %} {{ pelatih.nama_belakang }}
                        </option>
                    {% endfor %}
                </select>
                <p class="text-sm text-gray-500 mt-1">Hold Ctrl (Cmd di Mac) untuk memilih lebih dari satu pelatih.</p>
            </div>
            

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Jadwal</label>
                <input type="time" name="jadwal" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Hewan yang Terlibat</label>
                <select name="hewan_terlibat" multiple class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300">
                    <option value="Buaya">Buaya</option>
                    <option value="Iguana">Iguana</option>
                    <option value="Ular">Ular</option>
                    <option value="Komodo">Komodo</option>
                    <!-- Add more options if needed -->
                </select>
                <p class="text-sm text-gray-500 mt-1">Hold Ctrl (Cmd di Mac) untuk memilih lebih dari satu hewan.</p>
            </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="tutupModalAtraksi()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    function bukaModalAtraksi() {
        document.getElementById('modalAddAtraksi').classList.remove('hidden');
        document.getElementById('modalAddAtraksi').classList.add('flex');
    }

    function tutupModalAtraksi() {
        document.getElementById('modalAddAtraksi').classList.remove('flex');
        document.getElementById('modalAddAtraksi').classList.add('hidden');
    }
</script>
