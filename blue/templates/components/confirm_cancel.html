<div id="modalDeleteConfirm" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 z-50">
  <div class="bg-white rounded-2xl p-8 w-full max-w-md relative">
    <h2 class="text-2xl font-bold mb-4 text-center text-red-600">Konfirmasi Pembatalan</h2>
    <p class="text-center mb-6 text-gray-700">Apakah Anda yakin ingin membatalkan reservasi ini?</p>
    
    <form id="cancelReservationForm" method="post" action="/cancel-reservasi/">
      {% csrf_token %}
      <input type="hidden" name="nama_fasilitas" id="cancelNamaFasilitas" value="">
      <input type="hidden" name="tanggal_kunjungan" id="cancelTanggalKunjungan" value="">
      <input type="hidden" name="username_p" id="cancelerUsername" value="">


      <div class="flex justify-center space-x-4">
        <button type="button" onclick="closeCancelModal()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Tidak</button>
        <button type="submit" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">Ya, batalkan reservasi</button>
      </div>
    </form>
  </div>
</div>


<script>
    let deleteTarget = null;
    let deleteType = null;

    function confirmCancelModal(namaFasilitas, tanggalKunjungan, username_p) {
        event.stopPropagation();
        const modal = document.getElementById('modalDeleteConfirm');

        modal.classList.remove('hidden');
        modal.classList.add('flex');

        document.getElementById('cancelNamaFasilitas').value = namaFasilitas;
        document.getElementById('cancelTanggalKunjungan').value = tanggalKunjungan;
        document.getElementById('cancelerUsername').value = username_p;
    }

    function closeCancelModal() {
        document.getElementById('modalDeleteConfirm').classList.remove('flex');
        document.getElementById('modalDeleteConfirm').classList.add('hidden');
    }
</script>
