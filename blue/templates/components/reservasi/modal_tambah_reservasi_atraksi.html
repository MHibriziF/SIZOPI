<!-- Modal Tambah Reservasi -->
<div id="modalAddReservasi" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-lg relative">
        <h2 class="text-2xl font-bold mb-6 text-center">Reservasi Atraksi</h2>
        <form method="POST" action="#">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nama Atraksi</label>
                <select id="namaAtraksiSelect" name="nama_atraksi" onchange="updateAtraksiDetail()" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
                    <option value="">Pilih Atraksi</option>
                    {% for a in data_fasilitas.data_atraksi %}
                        <option 
                            value="{{ a.nama_atraksi }}"
                            data-lokasi="{{ a.lokasi }}"
                            data-jam="{{ a.jam }}"
                        >
                            {{ a.nama_atraksi }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Lokasi</label>
                <input type="text" id="lokasiAtraksi" name="lokasi" class="w-full px-4 py-2 border rounded-lg bg-gray-100" readonly required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Jam</label>
                <input type="time" id="jamAtraksi" name="jam" class="w-full px-4 py-2 border rounded-lg bg-gray-100" readonly required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Tanggal</label>
                <input type="date" id="tanggalAtraksi" name="tanggal" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Jumlah Tiket</label>
                <input type="number" name="tiket" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required min="1">
            </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="closeModalAddReservasi()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModalAddReservasi() {
        document.getElementById('modalAddReservasi').classList.remove('hidden');
        document.getElementById('modalAddReservasi').classList.add('flex');
    }

    function closeModalAddReservasi() {
        document.getElementById('modalAddReservasi').classList.remove('flex');
        document.getElementById('modalAddReservasi').classList.add('hidden');
    }

    function updateAtraksiDetail() {
        const select = document.getElementById('namaAtraksiSelect');
        const selectedOption = select.options[select.selectedIndex];

        document.getElementById('lokasiAtraksi').value = selectedOption.getAttribute('data-lokasi') || '';
        document.getElementById('jamAtraksi').value = selectedOption.getAttribute('data-jam') || '';
    }
</script>
