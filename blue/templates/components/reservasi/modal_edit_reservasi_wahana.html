<!-- Modal Edit Reservasi Wahana -->
<div id="modalEditReservasiWahana" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 z-50 ">
    <div class="bg-white rounded-2xl p-8 w-full max-w-lg max-h-[90vh] overflow-y-auto relative">
        <h2 class="text-2xl font-bold mb-6 text-center">Edit Reservasi</h2>
        <form method="POST" action="#">
            {% csrf_token %}

            <input type="hidden" id="editReservasiWahanaNama" name="nama_reservasi_wahana_diedit">
            <input type="hidden" id="editReservasiWahanaTanggal" name="tanggal_reservasi_diedit">
            <input type="hidden" id="editReservasiWahanaUsername" name="username_p">

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nama Wahana</label>
                <select id="editNamaWahana" name="nama_wahana" onchange="updateEditWahanaDetail()" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300">
                    <option value="">Pilih Wahana</option>
                    {% for w in data_fasilitas.data_wahana %}
                        <option 
                            class="text-black"
                            value="{{ w.nama_wahana }}"
                            data-peraturan="{{ w.peraturan }}"
                            data-jam="{{ w.jam }}"
                        >
                            {{ w.nama_wahana }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Peraturan</label>
                <textarea type="text" id="tampilanPeraturanEdit" name="peraturan" class="w-full px-4 py-2 border rounded-lg bg-gray-100 min-h-[100px]" readonly></textarea>
                <input type="hidden" id="editPeraturanWahana" name="peraturan" >
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Jam</label>
                <input type="time" id="editJamWahana" name="jam" class="w-full px-4 py-2 border rounded-lg bg-gray-100" readonly>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Tanggal</label>
                <input type="date" id="editTanggalWahana" name="tanggal" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Jumlah Tiket</label>
                <input type="number" id="editJumlahTiketWahana" name="tiket" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required min="1">
            </div>
         
            <div class="mb-6">
            <label for="editStatusWahana" class="block text-sm font-medium text-gray-700">Status</label>
            <select id="editStatusWahana" name="status" disabled class="w-full px-4 py-2 border rounded-lg bg-gray-100">
                <option value="Terjadwal">Terjadwal</option>
                <option value="Dibatalkan">Dibatalkan</option>
            </select>
            </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="closeModalEditReservasiWahana()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">Update</button>
            </div>
        </form>
    </div>
</div>

<script>
    
    function updateEditWahanaDetail() {
        const select = document.getElementById('editNamaWahana');
        const selectedOption = select.options[select.selectedIndex];

        document.getElementById('editPeraturanWahana').value = selectedOption.getAttribute('data-peraturan') || '';
        document.getElementById('editJamWahana').value = selectedOption.getAttribute('data-jam') || '';
        tampilkanPeraturanEdit();
    }

    function tampilkanPeraturanEdit() {
        const peraturanString = document.getElementById('editPeraturanWahana').value;
        const peraturanArray = peraturanString.split(';');
        const tampilkanPeraturan = peraturanArray.map((item, index) => `${index + 1}. ${item.trim()}`).join('\n');
        document.getElementById('tampilanPeraturanEdit').value = tampilkanPeraturan;
    }

    function openEditModalReservasiWahana(button) {
        event.stopPropagation();
        const nama = button.getAttribute('data-nama');
        const peraturan = button.getAttribute('data-peraturan') || button.getAttribute('data-lokasi-or-peraturan');
        const jam = button.getAttribute('data-jam');
        const tanggal = button.getAttribute('data-tanggal');
        const tiket = button.getAttribute('data-tiket');
        const status = button.getAttribute('data-status');
        const username_p = button.getAttribute('data-username');

        // Identifikasi reservasi yang akan diedit
        document.getElementById('editReservasiWahanaNama').value = nama;
        document.getElementById('editReservasiWahanaTanggal').value = tanggal;
        document.getElementById('editReservasiWahanaUsername').value = username_p;

        document.getElementById('editNamaWahana').value = nama;
        document.getElementById('editPeraturanWahana').value = peraturan;
        document.getElementById('editJamWahana').value = jam;
        document.getElementById('editTanggalWahana').value = tanggal;
        document.getElementById('editJumlahTiketWahana').value = tiket;
        
        // Tampilkan peraturan
        tampilkanPeraturanEdit();

        // Isi status
        const selectStatus = document.getElementById("editStatusWahana");
        if (status) {
            selectStatus.value = status;
        }
        console.log("Status:", status);
        document.getElementById('modalEditReservasiWahana').classList.remove('hidden');
        document.getElementById('modalEditReservasiWahana').classList.add('flex');
    }

    function closeModalEditReservasiWahana() {
        document.getElementById('modalEditReservasiWahana').classList.remove('flex');
        document.getElementById('modalEditReservasiWahana').classList.add('hidden');
    }
</script>
