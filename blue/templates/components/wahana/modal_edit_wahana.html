<!-- Modal Edit -->
<div id="modalEditWahana" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-lg relative max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-bold mb-6 text-center">Edit Wahana</h2>
        <form method="POST" action="#">
            {% csrf_token %}
            <input type="hidden" id="edit_nama_wahana_lama" name="nama_wahana_lama">

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nama Wahana</label>
                <input type="text" id="edit_nama_wahana" name="nama_wahana" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Kapasitas Maksimum</label>
                <input type="number" id="edit_kapasitas" name="kapasitas" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Jadwal</label>
                <input type="time" id="edit_jadwal" name="jadwal" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-300" required>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Peraturan</label>
                <div id="edit_peraturan_container">
                    <!-- peraturan list akan masuk lewat javascript -->
                </div>
                <button type="button" onclick="tambahPeraturanEdit()" class="mt-2 text-green-600 hover:text-green-800 font-semibold">+ Tambah Peraturan</button>
            </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="tutupModalEdit()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">Update</button>
            </div>
        </form>
    </div>
</div>
